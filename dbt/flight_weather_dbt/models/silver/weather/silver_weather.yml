version: 2

models:
  - name: stg_weather_observations
    columns:
      - name: airport_iata
        tests:
          - not_null

      - name: obs_ts_utc
        tests:
          - not_null

  - name: fct_weather_latest
    description: "Latest weather observation per airport_iata."
    columns:
      - name: airport_iata
        tests:
          - not_null
          - unique

      - name: obs_ts_utc
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - airport_iata
              - obs_ts_utc